# Vars
## config_directory: https://code.visualstudio.com/docs/getstarted/settings#_settings-file-locations
- tags:
    - vscode-config
  block:
    - name: Ensure VSCode config directory exists
      ansible.builtin.file:
        path: "{{ config_directory }}"
        state: directory
        mode: "0750"

    # Copy config files
    # https://bobbyhadz.com/blog/what-is-vscode-folder
    - name: Copy VSCode configuration files
      ansible.builtin.template:
        src: "{{ item }}"
        dest: "{{ config_directory }}/{{ item | regex_replace('\\.j2$', '') }}"
        mode: "0640"
      loop:
        - keybindings.json.j2
        - settings.json.j2

    - name: Install core VSCode extensions
      ansible.builtin.command: "{{ editor_command | default('code') }} --install-extension {{ item }}"
      changed_when: false
      loop:
        # VSCode config
        ## Keybindings: Awesome Emacs Keymap
        - tuttieee.emacs-mcx
        - editorconfig.editorconfig

        ## Themes
        - github.github-vscode-theme
        ### Switch to a night theme automatically
        - muuvmuuv.vscode-sundial
        - johnpapa.vscode-peacock

        ## Spell checker
        - streetsidesoftware.code-spell-checker

        # Git
        # magit: Emacs's magit for VSCode
        - kahole.magit
        - github.vscode-pull-request-github

        # Makefile
        - ms-vscode.makefile-tools

        # Markdown
        - shd101wyy.markdown-preview-enhanced
        - yzhang.markdown-all-in-one
        - bierner.markdown-mermaid

        # JSON / Prettier
        - esbenp.prettier-vscode

        # Yaml
        - redhat.vscode-yaml

        # Toml
        - tamasfe.even-better-toml

        # Fish shell
        - bmalehorn.vscode-fish

        # Terraform
        - hashicorp.terraform

        # Docker
        - ms-azuretools.vscode-docker

        # Ansible
        - redhat.ansible
        - wholroyd.jinja

        # SSH
        - ms-vscode-remote.remote-ssh
        - ms-vscode-remote.remote-ssh-edit

    - name: Install conditional VSCode extensions
      changed_when: false
      ansible.builtin.command: "{{ editor_command | default('code') }} --install-extension {{ item.extension }}"
      when: lookup('vars', item.condition)
      loop:
        # Go
        - extension: golang.go
          condition: install_go
        # TypeScript
        - extension: ms-vscode.vscode-typescript-next
          condition: install_typescript
        # Python
        - extension: ms-python.python
          condition: install_python
        # Protocol Buffers
        - extension: zxh404.vscode-proto3
          condition: install_protobuf
        # Kubernetes
        - extension: ms-kubernetes-tools.vscode-kubernetes-tools
          condition: install_kubectl
        - extension: ipedrazas.kubernetes-snippets
          condition: install_kubectl
      loop_control:
        label: "{{ item.extension }}"
